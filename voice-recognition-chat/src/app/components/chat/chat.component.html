<div class="chat-container">
  <textarea class="chat-textarea"
            placeholder="Type a message or record a voice note — live transcription will appear here as you speak…"
            [ngModel]="message()"
            (ngModelChange)="message.set($event)"
            (keydown.enter)="$event.preventDefault(); submitMessage($event)"
            rows="8"></textarea>

  <div class="chat-actions">
    <button mat-mini-fab
            class="btn-record"
            [class.recording]="isRecording()"
            aria-label="Start recording"
            matTooltip="Start recording"
            [disabled]="isRecording()"
            (click)="startRecording()">
      <mat-icon>mic</mat-icon>
    </button>

    <button mat-mini-fab
            class="btn-stop"
            [class.stopping]="!isRecording()"
            aria-label="Stop recording"
            matTooltip="Stop recording"
            [disabled]="!isRecording()"
            (click)="stopRecording()">
      <mat-icon>stop</mat-icon>
    </button>

    <button mat-mini-fab
            class="btn-send"
            aria-label="Send message"
            matTooltip="Send message"
            [disabled]="!hasMessage()"
            (click)="submitMessage($event)">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>

<div class="chat-messages">
  @for (message of messages(); track $index) {
    <div class="chat-message">
      <mat-icon class="message-icon">chat_bubble_outline</mat-icon>
      <span>{{ message }}</span>
    </div>
  }
</div>

<div class="recordings-section" *ngIf="recordings.length > 0">
  <h3 class="recordings-title">
    <mat-icon>audiotrack</mat-icon> Recordings
  </h3>
  @for (rec of recordings; track rec.id) {
    <div class="recording-item">
      <div class="recording-meta">
        <mat-icon class="recording-icon">mic</mat-icon>
        <span class="recording-duration">{{ rec.duration }}s</span>
        <span class="recording-time">{{ rec.createdAt | date:'HH:mm:ss' }}</span>
        @if (rec.transcript) {
          <span class="recording-transcript">"{{ rec.transcript }}"</span>
        }
      </div>
      <div class="recording-controls">
        <audio [src]="rec.url" controls></audio>
        <button mat-mini-fab class="btn-delete" matTooltip="Delete recording" (click)="deleteRecording(rec.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  }
</div>
