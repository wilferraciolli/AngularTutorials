<mat-tab-group>
  <mat-tab label="Flighs">
    <app-dynamic-form
      [metaInfo]="flightFormConfig"
      [dynamicForm]="flightsForm"
      (onFormClear)="handleClearFlightForm()"
      (onFormSubmit)="handleFlightSubmit()"
    />

    <mat-divider></mat-divider>
    <pre> {{ flightEntity() | json }}</pre>
  </mat-tab>

  <mat-tab label="Appointments">
    <app-dynamic-form
      [metaInfo]="appointmentFormConfig"
      [dynamicForm]="appointmentsForm"
      (onFormClear)="handleClearAppointmentForm()"
      (onFormSubmit)="handleAppointmentSubmit()"
    />

    <mat-divider></mat-divider>
    <pre> {{ appointmentEntity() | json }}</pre>
  </mat-tab>

  <mat-tab label="Third"> Content 3</mat-tab>
</mat-tab-group>
